name: CI/CD → Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : CI — Type check + Build
  # ─────────────────────────────────────────
  ci:
    name: 🔍 CI — Type check & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔎 Type check
        run: npx astro check

      - name: 🏗️ Build
        run: npm run build

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2 : CD — Deploy to Vercel (main only)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy → Vercel
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Deploy to Vercel
        id: deploy
        run: |
          npm install -g vercel
          DEPLOY_URL=$(vercel --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --env NODE_ENV=production)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: ✅ Deployment summary
        run: echo "🚀 Deployed to ${{ steps.deploy.outputs.url }}"

  # ─────────────────────────────────────────
  # JOB 3 : Preview — Deploy PR previews
  # ─────────────────────────────────────────
  preview:
    name: 👁️ Preview → Vercel
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 👁️ Deploy preview to Vercel
        id: preview
        run: |
          npm install -g vercel
          PREVIEW_URL=$(vercel --yes \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 💬 Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 👁️ Preview déployé !\n\n🔗 **URL**: ${{ steps.preview.outputs.url }}\n\n> Commit: \`${{ github.sha }}\``
            })
